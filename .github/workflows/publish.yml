name: Publish to PyPI

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"

      - id: check
        run: |
          if curl -sf "https://pypi.org/pypi/nappe/json" | python -c "import sys,json; exit(0 if json.load(sys.stdin)['info']['version']=='$VERSION' else 1)" 2>/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on PyPI, skipping"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION is new, will publish"
          fi
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - if: steps.check.outputs.should_publish == 'true'
        uses: astral-sh/setup-uv@v4

      - if: steps.check.outputs.should_publish == 'true'
        run: uv build

      - if: steps.check.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    if: needs.build.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
